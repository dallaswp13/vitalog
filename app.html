<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
  <title>myVitalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app-style.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Sign-out menu for the rail user chip */
    .user-menu{position:fixed;z-index:200;background:var(--surface-2,#2A2D33);
      border:.5px solid var(--rule,rgba(229,226,220,.16));border-radius:12px;
      padding:6px;display:flex;flex-direction:column;gap:2px;
      box-shadow:0 14px 40px rgba(0,0,0,.45);min-width:180px}
    .user-menu[hidden]{display:none}
    .user-menu-item{appearance:none;border:0;background:transparent;cursor:pointer;
      text-align:left;padding:9px 12px;border-radius:8px;color:var(--ink,#E5E2DC);
      font-family:'Geist',ui-sans-serif,system-ui,sans-serif;font-size:13px}
    .user-menu-item:hover{background:var(--chip,rgba(229,226,220,.06))}
    .user-menu-item.danger{color:#E89B7C}
  </style>
  <script>
  /* Auth bridge — gate the app behind sign-in; hydrate identity; enable sign-out. */
  window.__VITALOG_AUTH = (function () {
    var SUPABASE_URL = 'https://fqovfqzysvctejmtwigj.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_AgTnpMdSur2PLSGfGN8t8g_m1vgG5DH';
    var sb = null;
    try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); window.__sb = sb; } catch (e) {}
    var ready = (async function () {
      if (!sb) return undefined;            // library unavailable -> fail open
      try {
        var res = await sb.auth.getSession();
        var session = (res && res.data) ? res.data.session : null;
        if (!session) { location.replace('login.html'); return null; }
        return session;
      } catch (e) { console.warn('[auth] gate skipped:', e); return undefined; }
    })();
    return { client: sb, ready: ready };
  })();
  </script>
</head>
<body>
  <div class="app">
    <!-- ── Side rail ────────────────────────────────────────────── -->
    <aside class="rail" id="rail">
      <a href="#" class="wordmark" aria-label="myVitalog">
        <span class="my">my</span><span class="vita">Vita</span><span>log</span><span class="dot">.</span>
      </a>

      <nav class="rail-nav" id="rail-nav">
        <button type="button" class="rail-item active" data-tab="dashboard">
          <svg viewBox="0 0 24 24" class="icon"><path d="M3 12l9-9 9 9M5 10v10h14V10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Dashboard</span>
        </button>
        <button type="button" class="rail-item" data-tab="ai">
          <svg viewBox="0 0 24 24" class="icon"><path d="M12 3a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v2a3 3 0 0 1-3 3h-1v1a4 4 0 0 1-4 4 4 4 0 0 1-4-4v-1H7a3 3 0 0 1-3-3v-2a3 3 0 0 1 3-3h1V7a4 4 0 0 1 4-4z" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="9.5" cy="11.5" r="1" fill="currentColor"/><circle cx="14.5" cy="11.5" r="1" fill="currentColor"/></svg>
          <span>AI Assistant</span>
        </button>
        <button type="button" class="rail-item" data-tab="diet">
          <svg viewBox="0 0 24 24" class="icon"><path d="M5 11a7 7 0 0 1 14 0v1a7 7 0 0 1-14 0v-1zM3 12h18M9 5l1.5 3M15 5l-1.5 3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Diet</span>
        </button>
        <button type="button" class="rail-item" data-tab="exercise">
          <svg viewBox="0 0 24 24" class="icon"><path d="M3 12h2m14 0h2M6 9v6M18 9v6M9 7v10M15 7v10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span>Exercise</span>
        </button>
        <button type="button" class="rail-item" data-tab="sleep">
          <svg viewBox="0 0 24 24" class="icon"><path d="M21 13a9 9 0 1 1-10-10 7 7 0 0 0 10 10z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          <span>Sleep</span>
        </button>
        <button type="button" class="rail-item" data-tab="biometrics">
          <svg viewBox="0 0 24 24" class="icon"><path d="M3 12h3l2-6 4 12 2-6 2 3h5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Biometrics</span>
        </button>
        <button type="button" class="rail-item" data-tab="supplements">
          <svg viewBox="0 0 24 24" class="icon"><path d="M6 12a6 6 0 0 1 12 0v0a6 6 0 0 1-12 0zM6 12h12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span>Supplements</span>
        </button>
        <button type="button" class="rail-item" data-tab="journal">
          <svg viewBox="0 0 24 24" class="icon"><path d="M5 4h12a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2-3-2V6a2 2 0 0 1 1-2zM9 9h6M9 13h6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Journal</span>
        </button>
        <button type="button" class="rail-item" data-tab="metrics">
          <svg viewBox="0 0 24 24" class="icon"><path d="M4 20V8m6 12V4m6 16v-8m6 8v-4M4 20h16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span>Metrics</span>
        </button>
        <button type="button" class="rail-item" data-tab="settings">
          <svg viewBox="0 0 24 24" class="icon"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.5-2.4.9a7 7 0 0 0-2-1.2L14 3h-4l-.5 2.5a7 7 0 0 0-2 1.2l-2.4-.9-2 3.5 2 1.5a7 7 0 0 0 0 2.4l-2 1.5 2 3.5 2.4-.9a7 7 0 0 0 2 1.2L10 21h4l.5-2.5a7 7 0 0 0 2-1.2l2.4.9 2-3.5-2-1.5c.07-.4.1-.8.1-1.2z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          <span>Settings</span>
        </button>
      </nav>

      <div class="rail-foot">
        <button type="button" class="user-chip" title="dallaswp13@gmail.com">
          <span class="avatar">D</span>
          <span class="user-name">Dallas</span>
          <span class="caret">›</span>
        </button>
      </div>
    </aside>

    <!-- ── Main ────────────────────────────────────────────────── -->
    <main class="main" id="main">
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <button type="button" class="icon-btn" id="rail-toggle" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
          <div class="crumb">
            <span class="mono crumb-eyebrow" id="crumb-eyebrow">Tuesday · May 26</span>
            <h1 class="crumb-title" id="crumb-title">Dashboard</h1>
          </div>
        </div>
        <div class="topbar-right">
          <button type="button" class="date-nav" aria-label="Previous day"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <button type="button" class="date-pill" id="date-pill">Today</button>
          <button type="button" class="date-nav" aria-label="Next day"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <div class="topbar-sep"></div>
          <button type="button" class="btn-quick" id="quick-add">
            <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Quick log
          </button>
        </div>
      </header>

      <div class="content" id="content">
        <!-- Tab panels render here -->
      </div>
    </main>
  </div>

  <!-- ── Quick log modal ─────────────────────────────────────── -->
  <div class="modal-backdrop" id="quick-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="quick-modal-title">
      <header class="modal-head">
        <span class="eyebrow">Quick log</span>
        <h2 class="serif" id="quick-modal-title">What happened?</h2>
        <button type="button" class="icon-btn" id="quick-close" aria-label="Close">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </header>
      <div class="modal-body">
        <textarea id="quick-text" rows="4" placeholder="Had eggs and toast, went for a 3 mile run, slept 7.5 hours…"></textarea>
        <div class="quick-chips">
          <button type="button" class="chip" data-quick="Logged 2 cups water">+ Water</button>
          <button type="button" class="chip" data-quick="Vitamin D, magnesium, omega 3 — done">+ Supplements</button>
          <button type="button" class="chip" data-quick="Feeling good today, mood 4/5">+ Mood</button>
          <button type="button" class="chip" data-quick="Weighed in at 172.4 lb">+ Weight</button>
        </div>
      </div>
      <footer class="modal-foot">
        <span class="mono modal-hint">⌘ Enter to save</span>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="quick-cancel">Cancel</button>
          <button type="button" class="btn btn-primary" id="quick-save">Save with AI →</button>
        </div>
      </footer>
    </div>
  </div>

  <!-- Boot splash to avoid FOUC -->
  <div class="boot" id="boot">
    <span style="color:#E07A52;font-style:italic;">my</span><em style="font-style:italic;">Vita</em>log<span style="color:#E07A52;">.</span>
  </div>

  <script src="app-data.js?v=2"></script>
  <script src="app-tabs.js?v=2"></script>
  <script src="app-live.js?v=2"></script>
  <script src="app-main.js?v=2"></script>
  <script>
  (function () {
    var auth = window.__VITALOG_AUTH;
    if (!auth) return;

    function emailToName(email){
      if(!email) return '';
      var p=email.split('@')[0].replace(/[._-]+/g,' ').trim();
      return p ? p.charAt(0).toUpperCase()+p.slice(1) : '';
    }

    auth.ready.then(function (session) {
      if (!session || !session.user) return;
      var u = session.user, stored = {};
      try { stored = JSON.parse(localStorage.getItem('vitalog_settings')||'{}'); } catch(e){}
      var meta = u.user_metadata || {};
      var name = (stored.name||'').trim() || meta.full_name || meta.name || emailToName(u.email) || 'You';
      var email = u.email || '';
      var initial = (name||'?').trim().charAt(0).toUpperCase();

      if (window.VITALOG_DATA && window.VITALOG_DATA.user) {
        window.VITALOG_DATA.user.name = name;
        window.VITALOG_DATA.user.email = email;
        window.VITALOG_DATA.user.initial = initial;
      }
      var chip = document.querySelector('.user-chip');
      if (chip) {
        var nm = chip.querySelector('.user-name'); if (nm) nm.textContent = name;
        var av = chip.querySelector('.avatar'); if (av) av.textContent = initial;
        if (email) chip.setAttribute('title', email);
      }
      var greet = document.querySelector('#content em.accent');
      if (greet) greet.textContent = name + '.';
    });

    async function signOut() {
      try { if (auth.client) await auth.client.auth.signOut(); } catch(e){}
      location.href = 'login.html';
    }

    // Rail user-chip dropdown
    var chip = document.querySelector('.user-chip');
    if (chip) {
      var menu = document.createElement('div');
      menu.className = 'user-menu'; menu.hidden = true;
      menu.innerHTML =
        '<button type="button" class="user-menu-item" data-act="settings">Settings</button>' +
        '<button type="button" class="user-menu-item danger" data-act="signout">Sign out</button>';
      document.body.appendChild(menu);
      function place(){
        var r = chip.getBoundingClientRect();
        menu.style.left = r.left + 'px';
        menu.style.bottom = (window.innerHeight - r.top + 8) + 'px';
        menu.style.minWidth = r.width + 'px';
      }
      chip.addEventListener('click', function (e){
        e.stopPropagation();
        if (menu.hidden){ place(); menu.hidden = false; } else { menu.hidden = true; }
      });
      window.addEventListener('resize', function(){ if(!menu.hidden) place(); });
      document.addEventListener('click', function(){ menu.hidden = true; });
      menu.addEventListener('click', function (e){
        var b = e.target.closest('[data-act]'); if(!b) return;
        e.stopPropagation(); menu.hidden = true;
        if (b.dataset.act === 'signout') signOut();
        else location.hash = '#settings';
      });
    }

    // Settings -> "Sign out" link
    document.addEventListener('click', function (e){
      var b = e.target.closest('.settings-link');
      if (b && (b.textContent||'').trim().toLowerCase() === 'sign out') { e.preventDefault(); signOut(); }
    });
  })();
  </script>
</body>
</html>
